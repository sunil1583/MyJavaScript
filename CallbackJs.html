<html>
  <head>
    <body>
      <h1>Callback Functions in JavaScript</h1>
      <button id="callbackButton" onclick="fetchData()">Fetch Data</button>
      <button id="myButton">Greet User</button>
      <p id="callbackResult"></p>
      <script>
        document
          .getElementById("myButton")
          .addEventListener("click", function () {
            console.log("Button clicked!");
          });
        function fetchServiceData(callback) {
          fetch("https://jsonplaceholder.typicode.com/posts/1")
            .then((response) => response.json())
            .then(
              setTimeout(() => {
                console.log("Data processing completed.");
              }, 2000),
            )
            .then((data) => callback(data))
            .catch((error) => console.error("Error fetching data:", error));
        }
        function handle(data) {
          console.log("Data received:", data);
        }
        fetchServiceData(handle);

        function fetchData() {
          setTimeout(() => {
            const data = "Data fetched successfully!";
            document.getElementById("callbackResult").innerHTML = data;
          }, 2000);
        }
        function greet(name, callback) {
          const greeting = `Hello, ${name}!`;
          callback(greeting);
        }
        greet("Alice", (message) => {
          console.log(message);
        });

        function calc(a, b, callback) {
          return callback(a, b);
        }

        function add(x, y) {
          return x + y;
        }

        function mul(x, y) {
          return x * y;
        }

        console.log(calc(5, 3, add));
        console.log(calc(5, 3, mul));

        //Promises and async/await can also be used to handle asynchronous operations in a more elegant way, avoiding callback hell and improving code readability.
        function step1() {
          return new Promise((resolve) => {
            setTimeout(() => {
              console.log("Step 1 completed");
              resolve();
            }, 1000);
          });
        }

        function step2() {
          return new Promise((resolve) => {
            setTimeout(() => {
              console.log("Step 2 completed");
              resolve();
            }, 1000);
          });
        }

        function step3() {
          return new Promise((resolve) => {
            setTimeout(() => {
              console.log("Step 3 completed");
              resolve();
            }, 1000);
          });
        }

        // Chaining promises
        step1()
          .then(step2)
          .then(step3)
          .then(() => {
            console.log("promise All steps completed");
          });

        async function processSteps() {
          await step1();
          await step2();
          await step3();
          console.log("Async All steps completed");
        }

        processSteps();
      </script>
    </body>
  </head>
</html>
