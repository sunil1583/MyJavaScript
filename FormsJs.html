<html>
  <head>
    <title>Forms in JavaScript</title>
    <script src="myJs.js"></script>
  </head>
  <body>
    <h1>Forms in JavaScript</h1>
    <form id="myForm">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" /><br /><br />
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" /><br /><br />
      <input type="submit" value="Submit" />
      <input type="button" value="Add element" />
    </form>
    <p id="result"></p>
    <h2>Interactive List</h2>
    <ul id="itemList">
      <li>Item A</li>
      <li>Item B</li>
      <li>Item C</li>
    </ul>
    <list>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </list>
    <script>
      document
        .getElementById("myForm")
        .addEventListener("submit", function (event) {
          event.preventDefault(); // Prevent form from submitting
          let name = document.getElementById("name").value;
          let email = document.getElementById("email").value;
          if (!name || !email) {
            console.log("Please fill in all fields.");
            name = name || "N/A";
            email = email || "N/A";
          }
          document.getElementById("result").innerHTML =
            `Name: ${name}, Email: ${email}`;
        });

      document
        .querySelector('input[type="button"]')
        .addEventListener("click", function () {
          const newInput = document.createElement("input");
          newInput.type = "text";
          newInput.name = "newField";
          newInput.placeholder = "New Field";
          document.getElementById("myForm").appendChild(newInput);
        });

      //Interactive list
      const itemList = document.getElementById("itemList");
      itemList.addEventListener("click", function (event) {
        if (event.target.tagName === "LI") {
          event.target.style.textDecoration = "line-through";
          event.target.style.color = "yellow";
        }
      });
    </script>
  </body>
</html>
