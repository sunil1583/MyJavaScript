<!doctype html>
<html>
  <head>
    <title>Counter</title>
    <script>
      let counter = 0;
      let incCount = 0;
      let decCount = 0;
      function increment() {
        counter++;
        incCount++;
        update();
      }
      function decrement() {
        counter--;
        decCount++;
        update();
      }
      function update() {
        document.getElementById("counter").innerHTML = counter;
        document.getElementById("incCount").innerHTML = incCount;
        document.getElementById("decCount").innerHTML = decCount;
      }
      function reset() {
        counter = 0;
        incCount = 0;
        decCount = 0;
        document.getElementById("counter").innerHTML = counter;
        document.getElementById("incCount").innerHTML = incCount;
        document.getElementById("decCount").innerHTML = decCount;
      }
    </script>
  </head>
  <body>
    <h1>Counter</h1>
    <p id="counter">0</p>
    <button onclick="increment()">Increment</button>
    <button onclick="decrement()">Decrement</button>
    <button onclick="reset()">Reset</button>
    <div class="clicks">
      <p>Clicks on Increment: <span id="incCount">0</span></p>
      <p>Clicks on Decrement: <span id="decCount">0</span></p>
    </div>
  </body>
</html>
